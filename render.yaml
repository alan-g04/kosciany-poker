services:
  # Stateless WebSocket broker (FastAPI + Uvicorn).
  - type: web
    name: kosciany-poker-broker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      # Comma-separated list of origins allowed by CORS. Set to your web
      # host (e.g. https://kosciany-poker-web.onrender.com) in the Render UI.
      - key: ALLOWED_ORIGINS
        sync: false

  # SPA served by nginx. The bundle is built with a literal `__VITE_WS_URL__`
  # placeholder; nginx's docker-entrypoint script (10-set-ws-url.sh) seds the
  # real broker URL into the JS at container start using the runtime env var.
  # This avoids needing Docker build args, which Render's blueprint doesn't
  # support for Docker services.
  - type: web
    name: kosciany-poker-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: VITE_WS_URL
        sync: false
